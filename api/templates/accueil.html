<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prédiction Diabète</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="text-center">Prédiction si une personne est en risque de diabète ou pas</h3>
                </div>

                <div class="card-body">

                    <form id="predictionForm">

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombre de grossesse</label>
                                <input type="number" class="form-control" id="pregnancies" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Glucose</label>
                                <input type="number" step="0.01" class="form-control" id="glucose" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Diastolic</label>
                                <input type="number" step="0.01" class="form-control" id="diastolic" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Triceps</label>
                                <input type="number" step="0.01" class="form-control" id="triceps" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Insuline</label>
                                <input type="number" step="0.01" class="form-control" id="insulin" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">BMI</label>
                                <input type="number" step="0.01" class="form-control" id="bmi" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">DPF</label>
                                <input type="number" step="0.001" class="form-control" id="dpf" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Age</label>
                                <input type="number" class="form-control" id="age" required>
                            </div>

                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">
                                Prédire
                            </button>
                        </div>

                    </form>

                    <div class="mt-4">
                        <div id="resultat"></div>
                    </div>

                </div>
            </div>

        </div>
    </div>

</div>

<script>

document.getElementById("predictionForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const data = {
        pregnancies: parseInt(document.getElementById("pregnancies").value),
        glucose: parseFloat(document.getElementById("glucose").value),
        diastolic: parseFloat(document.getElementById("diastolic").value),
        triceps: parseFloat(document.getElementById("triceps").value),
        insulin: parseFloat(document.getElementById("insulin").value),
        bmi: parseFloat(document.getElementById("bmi").value),
        dpf: parseFloat(document.getElementById("dpf").value),
        age: parseInt(document.getElementById("age").value)
    };

    const response = await fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    const div = document.getElementById("resultat");

    if(result.resultat === 1){

        div.innerHTML = `
            <div class="card border-danger shadow">
                <div class="card-body text-center">
                    <h2 class="text-danger">⚠️ Cette personne risque d'être diabètique</h2>
                </div>
            </div>
        `;

    }else{

        div.innerHTML = `
            <div class="card border-success shadow">
                <div class="card-body text-center">
                    <h2 class="text-success">✅ Cette personne ne risque pas d'être diabètique</h2>
                </div>
            </div>
        `;
    }
});

</script>

</body>
</html>
